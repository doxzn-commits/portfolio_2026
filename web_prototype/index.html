<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- 사내 자산 이미지 포함 시안 — 검색엔진 색인·크롤링 차단. 정식 공개 전 제거할 것 -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>도유진 · Growth Marketer (비공개 시안)</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#FFFFFF; --bg-sub:#FAFAFA;
  --text:#1D1D1F; --text-sub:#6E6E73; --accent:#3182F6;
  --P:1600px; --XW:45px; --YW:-170px; --DZ:97px;
  --cardW:480px; --cardH:360px; --r:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
/* overscroll-behavior:none — 모바일에서 스택을 아래로 끌 때
   브라우저가 '당겨서 새로고침'으로 오인하는 것을 막는다 */
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased;
}
/* 드래그 중 텍스트가 선택돼 형광펜처럼 보이던 문제 */
.wrap{position:relative;height:100%;user-select:none;-webkit-user-select:none}

/* ── 3층 구조 ─────────────────────────────
   1) .veil  그라데이션 (카드 뒤)  z:1
   2) .stage 카드                 z:2
   3) .hero  텍스트만             z:3
   베일이 카드 위에 있으면 리프트한 카드가 뿌옇게 가려진다. */
.veil{
  position:absolute;left:0;top:0;bottom:0;width:44%;
  z-index:1;pointer-events:none;
  background:linear-gradient(90deg,
    #fff 0%, #fff 52%, rgba(255,255,255,.72) 76%, rgba(255,255,255,0) 100%);
}
.hero{
  position:absolute;left:0;top:0;bottom:0;width:38%;
  padding:64px 56px;
  display:flex;flex-direction:column;justify-content:center;
  z-index:3;
  pointer-events:none;          /* 텍스트가 카드 hover를 막지 않도록 */
}
.hero > *{pointer-events:auto}
.hero h1{
  font-size:56px;font-weight:600;letter-spacing:-.02em;line-height:1.25;
}
.hero .sub{
  margin-top:20px;font-size:16px;font-weight:400;line-height:1.7;color:var(--text-sub);
}
.rule{width:40px;height:1px;background:#D2D2D7;margin:40px 0 0}
.meta{
  margin-top:28px;font-size:13px;line-height:2;color:var(--text-sub);
  opacity:0;transform:translateY(8px);
  transition:opacity .24s ease .08s, transform .24s ease .08s;
}
.meta.on{opacity:1;transform:none}
.meta b{display:inline-block;width:64px;font-weight:500;color:#8E8E93}
.meta .t{color:var(--text);font-weight:600;font-size:15px}
.hint{
  position:absolute;left:56px;bottom:48px;font-size:12px;color:#A1A1A6;letter-spacing:.02em;
}

/* ── 우측 스택 ─────────────────────────── */
/* 스테이지는 화면 전체 — 카드가 히어로 밑으로 흘러들어가야 한다 */
/* touch-action:none — 스테이지 위 터치는 전부 JS가 처리한다.
   이게 없으면 브라우저가 같은 제스처로 페이지를 스크롤·새로고침해 버린다 */
.stage{position:absolute;inset:0;z-index:2;perspective:var(--P);perspective-origin:58% 70%;
       overflow:hidden;touch-action:none;overscroll-behavior:none}
.stack{
  position:absolute;inset:0;
  transform-style:preserve-3d;
  transform:rotateX(8deg) rotateY(-18deg) rotateZ(-4deg);
  pointer-events:none;   /* ★ 이게 없으면 stack 평면(z=0)이 뒤쪽 카드의 포인터를 전부 가로챈다 */
}
/* .card = 스택 위치 전담 (물리 루프가 매 프레임 덮어씀 — transition 금지) */
.card{
  position:absolute;left:56%;top:86%;
  width:var(--cardW);height:var(--cardH);
  margin-left:calc(var(--cardW) / -2); margin-top:calc(var(--cardH) / -2);
  transform-style:preserve-3d;
  cursor:pointer;
  will-change:transform;
  pointer-events:auto;   /* stack이 none이므로 카드만 되살린다 */
}
/* .lifter = 리프트 전담 (CSS transition) — 레이어를 나눠야 전환이 부드럽다 */
.lifter{
  position:absolute;inset:0;
  transform-style:preserve-3d;
  transition:transform .16s cubic-bezier(.32,.72,.36,1);   /* 나갈 때: 짧게 */
}
/* --liftZ는 JS가 카드별로 계산해 넣는다.
   고정값이면 뒤쪽 카드가 스택 앞줄(z=0)을 못 넘어서 앞 카드에 가려진다. */
.card{--liftZ:120px}
.card.lift .lifter{
  transform:translate3d(-70px,0,var(--liftZ))
            rotateZ(4deg) rotateY(18deg) rotateX(-8deg) scale(1.15);
  transition-duration:.22s;                                /* 들어올 때 */
}
/* 그림자는 box-shadow를 애니메이션하면 매 프레임 리페인트 → opacity 교차 페이드로 */
.lifter::before,.lifter::after{
  content:'';position:absolute;inset:0;border-radius:var(--r);
  pointer-events:none;transition:opacity .18s ease;
}
.lifter::before{box-shadow:0 12px 28px rgba(0,0,0,.16);opacity:1}
.lifter::after {box-shadow:0 40px 80px rgba(0,0,0,.28);opacity:0}
.card.lift .lifter::before{opacity:0}
.card.lift .lifter::after {opacity:1}
.card .inner{
  position:absolute;inset:0;display:flex;align-items:center;
  padding:26px 28px;gap:22px;
  border-radius:var(--r);overflow:hidden;   /* 클리핑은 여기서 — .lifter는 그림자를 밖으로 내야 한다 */
}
.card img{
  height:78%;width:auto;max-width:46%;object-fit:contain;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.22));
  -webkit-user-drag:none;pointer-events:none;   /* 이미지 고스트 드래그 방지 */
}
.card.wide .inner{padding:0;display:block}
.card.wide img{
  position:absolute;inset:0;width:100%;height:100%;max-width:none;
  object-fit:cover;object-position:center top;filter:none;
}
.card.wide .txt{
  position:absolute;left:0;right:0;bottom:0;padding:24px 26px 20px;
  background:linear-gradient(to top,rgba(0,0,0,.72),transparent);
}
.txt{flex:1;min-width:0;position:relative;z-index:2}
.txt .name{font-size:22px;font-weight:600;letter-spacing:-.01em;line-height:1.3}
.txt .kpi{font-size:32px;font-weight:700;letter-spacing:-.02em;margin-top:10px}
.txt .org{font-size:12px;font-weight:500;letter-spacing:.02em;margin-top:8px;opacity:.72}

/* ── 상세 화면 ─────────────────────────── */
.detail{
  position:fixed;inset:0;background:var(--bg);z-index:9000;
  padding:64px 72px;overflow:auto;overscroll-behavior:contain;
  opacity:0;visibility:hidden;transform:translateY(8px);
  transition:opacity .26s ease,transform .26s cubic-bezier(.22,1,.36,1),visibility .26s;
}
.detail.on{opacity:1;visibility:visible;transform:none}
.back{
  border:0;background:none;font:inherit;font-size:13px;color:var(--text-sub);
  cursor:pointer;padding:0;margin-bottom:56px;letter-spacing:.02em;
}
.back:hover{color:var(--text)}
.dinner{max-width:1080px;margin:0 auto}

/* ① 헤더 */
.dorg{font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.02em;margin-bottom:14px}
.detail h2{font-size:48px;font-weight:600;letter-spacing:-.025em;line-height:1.2}
.dm{display:flex;gap:44px;margin-top:28px;font-size:14px}
.dm > div{display:flex;gap:12px}
.dm dt{color:#8E8E93;font-weight:500}
.dm dd{color:var(--text);font-weight:500}

/* ② 성과 스트립 */
.d-kpis{list-style:none;display:flex;gap:12px;margin:40px 0 56px;flex-wrap:wrap}
.d-kpis li{
  flex:1 1 200px;background:var(--bg-sub);border-radius:16px;padding:24px 26px;
}
.d-kpis .v{font-size:40px;font-weight:700;letter-spacing:-.03em;line-height:1.05}
.d-kpis .l{font-size:13px;color:var(--text-sub);margin-top:10px}

/* ③ 본문 2단 */
.d-body{display:grid;grid-template-columns:1fr 420px;gap:64px;align-items:start}
.d-sec{margin-bottom:44px}
.d-sec h3{
  font-size:12px;font-weight:600;letter-spacing:.08em;color:#8E8E93;
  text-transform:uppercase;margin-bottom:16px;
}
.d-sec p{font-size:17px;line-height:1.75;letter-spacing:-.01em}
.d-sec blockquote{
  font-size:19px;line-height:1.7;letter-spacing:-.015em;font-weight:500;
  border-left:2px solid var(--accent);padding-left:20px;
}
.d-sec blockquote::before{content:'“'}
.d-sec blockquote::after{content:'”'}
.d-sec ol{list-style:none;counter-reset:s}
.d-sec ol li{
  counter-increment:s;position:relative;padding-left:34px;margin-bottom:14px;
  font-size:16px;line-height:1.7;
}
.d-sec ol li::before{
  content:counter(s,decimal-leading-zero);position:absolute;left:0;top:2px;
  font-size:12px;font-weight:600;color:var(--accent);letter-spacing:.04em;
}
.d-fig{
  border-radius:var(--r);overflow:hidden;min-height:320px;
  display:flex;align-items:center;justify-content:center;padding:28px;
  position:sticky;top:32px;
}
.d-fig img{max-width:100%;max-height:440px;object-fit:contain;
           filter:drop-shadow(0 12px 32px rgba(0,0,0,.22))}

/* ④ 성과 표 */
.d-res{margin-top:8px}
.d-res table{width:100%;border-collapse:collapse;font-size:16px}
.d-res th{
  text-align:left;font-size:12px;font-weight:600;letter-spacing:.06em;color:#8E8E93;
  padding:0 0 14px;border-bottom:1px solid #E8E8ED;
}
.d-res td{padding:18px 0;border-bottom:1px solid #F0F0F3}
.d-res td:first-child{color:var(--text-sub)}
.d-res td:nth-child(2){color:#A1A1A6}
.d-res td:last-child{font-weight:700;letter-spacing:-.02em;font-size:20px}

/* ⑤ 이전 / 다음 */
.d-nav{display:flex;justify-content:space-between;gap:16px;margin-top:64px;
       border-top:1px solid #E8E8ED;padding-top:24px}
.d-nav button{
  border:0;background:none;font:inherit;font-size:14px;color:var(--text-sub);
  cursor:pointer;padding:8px 0;text-align:left;
}
.d-nav button:last-child{text-align:right}
.d-nav button:hover{color:var(--text)}
.d-nav button:disabled{opacity:.3;cursor:default}

@media (max-width:860px){
  .detail{padding:40px 24px}
  .detail h2{font-size:30px}
  .dm{flex-direction:column;gap:8px;margin-top:20px}
  .d-kpis{margin:28px 0 40px}
  .d-kpis .v{font-size:32px}
  .d-body{grid-template-columns:1fr;gap:32px}
  .d-fig{position:static;min-height:0}
  .back{margin-bottom:32px}
}

/* ── 모바일: 세로 캐스케이드 ─────────────── */
@media (max-width:860px){
  :root{--P:1200px;--XW:0px;--YW:-160px;--DZ:120px;--cardW:min(340px,86vw);--cardH:calc(min(340px,86vw) * .75);--r:20px}
  html,body{overflow-y:auto;overflow-x:hidden}
  .wrap{display:flex;flex-direction:column;height:auto}
  /* 모바일은 겹침 구조를 풀고 위아래로 쌓는다 */
  .hero{position:static;width:100%;padding:56px 24px 24px}
  .veil{display:none}
  .stage{position:relative;inset:auto;perspective-origin:50% 60%}
  .hero h1{font-size:32px}
  .hero .sub{font-size:15px;margin-top:14px}
  .rule,.meta,.hint{display:none}
  .stage{height:78vh;min-height:520px}
  .stack{transform:none}
  .card{left:50%;top:74%}
  .card.lift .lifter{transform:none}   /* 모바일은 리프트 없음 */
}
</style>
</head>
<body>
<div class="wrap">
  <div class="veil"></div>
  <header class="hero">
    <h1>안녕하세요<br>도유진입니다.</h1>
    <p class="sub">가설을 세우고, 검증하고,<br>시스템으로 고정합니다.</p>
    <div class="rule"></div>
    <div class="meta" id="meta">
      <div class="t" id="m0"></div>
      <div><b>기간</b><span id="m1"></span></div>
      <div><b>소속</b><span id="m2"></span></div>

    <div class="hint">스크롤 · 드래그로 넘기고, 카드에 커서를 올려보세요</div>

  <main class="stage" id="stage">
    <div class="stack" id="stack"></div>

</div>

<!-- /work/[slug] 상세 페이지 — 모든 프로젝트가 동일 규격 -->
<section class="detail" id="detail">
 <div class="dinner">
  <button class="back" id="back">← 목록으로</button>

  <!-- ① 헤더 -->
  <header class="d-head">
    <div class="dorg" id="d-org"></div>
    <h2 id="d-name"></h2>
    <dl class="dm">
      <div><dt>기간</dt><dd id="d-date"></dd></div>
      <div><dt>소속</dt><dd id="d-comp"></dd></div>
      <div><dt>역할</dt><dd id="d-role"></dd></div>
    </dl>
  </header>

  <!-- ② 성과 스트립 -->
  <ul class="d-kpis" id="d-kpis"></ul>

  <!-- ③ 본문 2단: 문제 → 가설 → 실행 / 비주얼 -->
  <div class="d-body">
    <div class="d-text">
      <section class="d-sec"><h3>문제</h3><p id="d-pb"></p></section>
      <section class="d-sec"><h3>가설</h3><blockquote id="d-hy"></blockquote></section>
      <section class="d-sec"><h3>실행</h3><ol id="d-ac"></ol></section>
    </div>
    <div class="d-fig" id="d-fig"></div>
  </div>

  <!-- ④ 성과 표 -->
  <section class="d-sec d-res">
    <h3>성과</h3>
    <table id="d-rs"><thead><tr><th>지표</th><th>이전</th><th>이후</th></tr></thead><tbody></tbody></table>
  </section>

  <!-- ⑤ 이전 / 다음 -->
  <nav class="d-nav">
    <button id="d-prev"></button>
    <button id="d-next"></button>
  </nav>
 </div>
</section>

const D=[

/* ── 카드 생성 ────────────────────────── */
const stack=document.getElementById('stack');
const els=P.map((p,i)=>{
  const el=document.createElement('article');
  el.className='card'+(p.wide?' wide':'');
  el.style.color=p.fg;
  el.innerHTML=`<div class="lifter"><div class="inner">
      ${p.img?`<img src="${p.img}" alt="">`:''}
      <div class="txt">
        <div class="name">${p.line||p.n}</div>
        <div class="kpi">${p.k}</div>
        <div class="org">${p.o} · ${p.d}</div>
      </div>
    </div></div>`;
  el.querySelector('.lifter').style.background=p.bg;
  el.addEventListener('pointerenter',()=>setFocus(i));
  el.addEventListener('pointerleave',()=>clearFocus(i));   // 즉시 해제
  el.addEventListener('click',()=>{ down=false; if(!moved) openDetail(i); });
  stack.appendChild(el); return el;
});

/* ── 레이아웃 ─────────────────────────── */
const cs=getComputedStyle(document.documentElement);
let CFG={};
function readCfg(){
  CFG={XW:parseFloat(cs.getPropertyValue('--XW')),
       YW:parseFloat(cs.getPropertyValue('--YW')),
       DZ:parseFloat(cs.getPropertyValue('--DZ')),
       P :parseFloat(cs.getPropertyValue('--P')),
       mobile: window.matchMedia('(max-width:860px)').matches};
}
readCfg(); addEventListener('resize',()=>{readCfg();layout()});

let offset=0, target=0, vel=0, focus=-1;
const K=200, C=28;                       // 스프링: ζ=0.990, 정착 0.286s
const PX_PER_CARD=130;

function setFocus(i){
  if(CFG.mobile||down) return;      // 드래그 중에는 포커스 변경 안 함
  if(focus===i) return;
  focus=i; layout(); showMeta(i);
}
function clearFocus(i){
  if(CFG.mobile||down) return;
  if(focus!==i) return;             // 이미 다른 카드로 넘어갔으면 무시
  focus=-1; layout(); showMeta(-1);
}
function showMeta(i){
  const m=document.getElementById('meta');
  if(i<0){ m.classList.remove('on'); return; }
  m0.textContent=P[i].n; m1.textContent=P[i].d; m2.textContent=P[i].o; m3.textContent=P[i].r;
  m.classList.add('on');
}

function layout(){
  const {XW,YW,DZ,P:PP}=CFG;
  els.forEach((el,i)=>{
    const k=i-offset;
    if(k<-0.9||k>7.6){ el.style.display='none'; el.classList.remove('lift'); return; }
    el.style.display='';
    // 불변식: "커서가 닿는다 ⟺ 리프트된다". 반투명 카드는 아예 포인터를 받지 않는다.
    let op = k<0 ? Math.max(0,1+k/0.9) : (k<=6.5 ? 1 : Math.max(0,1-(k-6.5)/1.1));
    const live   = (op>0.99 && k>-0.5);
    const lifted = (i===focus && live);
    el.style.pointerEvents = live ? 'auto' : 'none';
    // 자기 깊이를 되갚아 최종 z=+120. 앞줄(z=0)은 넘되 원근 확대는 최소로.
    if(lifted) el.style.setProperty('--liftZ',(DZ*k+120)+'px');
    el.style.transform=`translate3d(${XW*k}px,${YW*k}px,${-DZ*k}px)`;
    el.style.opacity=op;
    el.style.zIndex=String(2000-Math.round(k*10)+(lifted?900:0));
    el.classList.toggle('lift',lifted);
  });
}

/* ── 물리 루프 (정착하면 정지 — 유휴 시 rAF 0) ── */
let last=0, running=false, lastFrame=0;
function tick(now){
  lastFrame=now;
  const dt=Math.min(.032,(now-last)/1000); last=now;
  const a=(target-offset)*K - vel*C;
  vel+=a*dt; offset+=vel*dt;
  if(Math.abs(target-offset)<.0005&&Math.abs(vel)<.002){
    offset=target; vel=0; running=false; layout(); return;
  }
  layout(); requestAnimationFrame(tick);
}
function start(){
  const now=performance.now();
  // rAF가 끊겼다 살아난 경우(백그라운드 탭 등) running이 true로 고착돼
  // 이후 입력이 전부 무시된다. 250ms 넘게 프레임이 없으면 강제 복구.
  if(running && now-lastFrame>250) running=false;
  if(running) return;
  running=true; last=now; lastFrame=now; requestAnimationFrame(tick);
}
layout();

function clamp(v){return Math.max(0,Math.min(P.length-1,v))}

/* 휠 */
addEventListener('wheel',e=>{
  if(CFG.mobile) return;
  e.preventDefault();
  target=clamp(target+e.deltaY/PX_PER_CARD); start();
},{passive:false});

/* 드래그 */
let down=false,sy=0,st=0,moved=false,t0=0;
const stage=document.getElementById('stage');
stage.addEventListener('pointerdown',e=>{
  down=true;moved=false;t0=performance.now();
  sy=e.clientY;st=target;
  // setPointerCapture는 여기서 걸지 않는다 — 걸면 카드 hover가 죽는다.
});
addEventListener('pointermove',e=>{
  if(!down)return;
  const d=e.clientY-sy;                    // ↓ 끌면 카드도 ↓ (자연 방향)
  if(!moved&&Math.abs(d)>6){
    moved=true;
    stage.setPointerCapture(e.pointerId);  // 실제 드래그가 시작된 뒤에만 캡처
    if(focus>=0){focus=-1;layout();showMeta(-1);}
  }
  if(moved){ target=clamp(st+d/PX_PER_CARD); start(); }
});
function endDrag(e){
  if(e&&moved&&stage.hasPointerCapture&&stage.hasPointerCapture(e.pointerId))
    stage.releasePointerCapture(e.pointerId);
  down=false;
}
// capture 단계로 받아 어떤 핸들러보다 먼저 해제한다.
addEventListener('pointerup',endDrag,true);
addEventListener('pointercancel',endDrag,true);
addEventListener('blur',()=>{down=false});          // 창을 벗어나도 드래그 해제
document.addEventListener('visibilitychange',()=>{down=false});

/* ── 상세 화면 열고 닫기 ─────────────────── */
const detail=document.getElementById('detail');
const $=id=>document.getElementById(id);   // id에 하이픈이 있어 전역 참조가 안 된다
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let curIdx=-1;

function openDetail(i){
  const p=P[i], d=D[i]||{ac:[],rs:[]};
  curIdx=i;
  // ① 헤더
  $('d-org').textContent=p.o;   $('d-name').textContent=p.n;
  $('d-date').textContent=p.d;  $('d-comp').textContent=p.o;  $('d-role').textContent=p.r;
  // ② 성과 스트립 — 표의 '이후' 값에서 자동 생성
  $('d-kpis').innerHTML=(d.rs||[]).slice(0,3)
    .map(r=>`<li><div class="v">${esc(r[2])}</div><div class="l">${esc(r[0])}</div></li>`).join('');
  // ③ 문제 · 가설 · 실행
  $('d-pb').textContent=d.pb||'';
  $('d-hy').textContent=d.hy||'';
  $('d-ac').innerHTML=(d.ac||[]).map(a=>`<li>${esc(a)}</li>`).join('');
  const fig=$('d-fig');
  fig.style.background=p.bg;
  fig.innerHTML=p.img?`<img src="${p.img}" alt="${esc(p.n)}">`:'';
  // ④ 성과 표
  $('d-rs').querySelector('tbody').innerHTML=(d.rs||[])
    .map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join('');
  // ⑤ 이전 / 다음
  const prev=$('d-prev'), next=$('d-next');
  prev.disabled=(i===0);          prev.textContent=i>0?'← '+P[i-1].n:'';
  next.disabled=(i===P.length-1); next.textContent=i<P.length-1?P[i+1].n+' →':'';
  detail.classList.add('on');
  detail.scrollTop=0;
  history.pushState({d:1},'','#work-'+(i+1));
}
function closeDetail(){
  detail.classList.remove('on');
  if(location.hash) history.replaceState(null,'',location.pathname);
}
document.getElementById('back').addEventListener('click',closeDetail);
$('d-prev').addEventListener('click',()=>{if(curIdx>0)openDetail(curIdx-1)});
$('d-next').addEventListener('click',()=>{if(curIdx<P.length-1)openDetail(curIdx+1)});
addEventListener('popstate',()=>detail.classList.remove('on'));

/* 키보드 */
addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeDetail();return;}
  if(detail.classList.contains('on'))return;
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){target=clamp(Math.round(target)+1);start();}
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){target=clamp(Math.round(target)-1);start();}
});
stage.addEventListener('pointerleave',()=>{focus=-1;showMeta(-1);layout()});
</script>
</body>
</html>
